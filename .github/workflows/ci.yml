name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run tests with coverage
        run: dotnet test --no-build -c Release --settings coverage.runsettings --collect:"XPlat Code Coverage" --results-directory ./coverage-results

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: reportgenerator -reports:"./coverage-results/**/coverage.cobertura.xml" -targetdir:"./coverage-report" -reporttypes:"TextSummary"

      - name: Check coverage threshold (>= 90%)
        run: |
          cat ./coverage-report/Summary.txt
          LINE_COV=$(grep "Line coverage" ./coverage-report/Summary.txt | grep -oP '[\d.]+(?=%)')
          echo "Line coverage: ${LINE_COV}%"
          awk -v cov="$LINE_COV" 'BEGIN {
            if (cov + 0 < 90) {
              printf "FAIL: coverage %.1f%% is below the 90%% threshold\n", cov
              exit 1
            }
            printf "PASS: coverage %.1f%%\n", cov
          }'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage-report
