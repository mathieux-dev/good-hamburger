<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <circle cx="16" cy="16" r="15" fill="#1c5236"/>

  <!-- Top bun -->
  <ellipse cx="16" cy="12.5" rx="10.5" ry="5.5" fill="#d4a537"/>
  <!-- Sesame seeds -->
  <ellipse cx="12" cy="9.5" rx="1.3" ry="0.75" fill="#f3e8c8" transform="rotate(-20 12 9.5)"/>
  <ellipse cx="17" cy="8"   rx="1.3" ry="0.75" fill="#f3e8c8" transform="rotate(8 17 8)"/>
  <ellipse cx="22" cy="10"  rx="1.3" ry="0.75" fill="#f3e8c8" transform="rotate(-10 22 10)"/>

  <!-- Lettuce -->
  <rect x="5.5" y="17" width="21" height="2.5" rx="1.2" fill="#5a9e6f"/>

  <!-- Patty -->
